name: mcpserver
metadata:
  subscription: ${AZURE_SUBSCRIPTION_ID}
  location: ${AZURE_LOCATION}
  resource_group: ${AZURE_RESOURCE_GROUP}
  template: azd-mcp-csharp@0.0.1-beta
infra:
  bicep: ./infra/main.bicep
services:
  mcpserver:
    project: ./src/mcpserver
    host: containerapp
    language: csharp
    docker:
      context: ./
      path: DOCKERFILE
    resources:
      cpu: 0.5
      memory: 1Gi
